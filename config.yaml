# Leading-Line 算法的全部可调参数
# 注释中 *_bgr 表示这是 OpenCV 内部用的 BGR 顺序（不是 RGB）

camera:
  index: 0                # USB 摄像头设备号
  width: 640              # 期望分辨率
  height: 480
  fps: 30

# 顶层 colors/visualization 是 blue_path 的默认值（保留以兼容 main.py 单机调试）
colors:
  road:                   # 谷仓道路（蓝色）
    hsv_lower: [100, 50, 50]
    hsv_upper: [130, 255, 255]
  floor:                  # 谷仓地面（黄/棕色谷物，禁行）
    hsv_lower: [0, 8, 15]
    hsv_upper: [80, 255, 255]

visualization:
  path_color_bgr: [0, 255, 0]
  path_thickness: 4
  edge_color_bgr: [0, 0, 255]
  edge_thickness: 2
  road_overlay_bgr: [47, 130, 238]
  road_overlay_alpha: 0.0
  floor_overlay_bgr: [0, 165, 255]
  floor_overlay_alpha: 0.0
  show_hud: true

# --------------------------------------------------------------------------
# 模式预设：UI 上"蓝色路径 / 绿色路径 / 测试模式"对应这里的三组配置
# 每组都包含 colors（HSV 分割阈值）和 visualization（BGR 渲染色）
# 切换模式时把整组覆盖进 effective config 即可
# 双端：PC UI 把 mode 名通过 TCP 发到 Jetson，Jetson 用 select_mode() 解析
# --------------------------------------------------------------------------
modes:
  blue_path:                 # 蓝色路径模式（保持原算法）
    label: "蓝色路径模式"
    colors:
      road:                  # 谷仓道路（蓝色）
        hsv_lower: [100, 50, 50]
        hsv_upper: [130, 255, 255]
      floor:                 # 谷仓地面（黄/棕色谷物，禁行）
        hsv_lower: [0, 8, 15]
        hsv_upper: [80, 255, 255]
    visualization:
      path_color_bgr: [0, 255, 0]            # 中心引导线（绿）
      path_thickness: 4
      edge_color_bgr: [0, 0, 255]            # 道路外轮廓（红）
      edge_thickness: 2
      road_overlay_bgr: [47, 130, 238]       # 道路区域叠加（橙）
      road_overlay_alpha: 0.0                # 0 = 不覆盖
      floor_overlay_bgr: [0, 165, 255]       # 地面/谷物叠加（橙）
      floor_overlay_alpha: 0.0               # 0 = 不覆盖
      show_hud: true

  green_path:                # 绿色路径模式
    label: "绿色路径模式"
    colors:
      road:                  # 绿色道路
        hsv_lower: [35, 50, 50]              # H∈[35,85] 涵盖大多数纯绿到深绿
        hsv_upper: [85, 255, 255]
      floor:                 # 谷地保持与蓝色模式一致
        hsv_lower: [0, 8, 15]
        hsv_upper: [80, 255, 255]
    visualization:
      path_color_bgr: [0, 255, 0]            # 中心引导线（绿）
      path_thickness: 4
      edge_color_bgr: [0, 255, 0]            # 道路外轮廓（深绿/亮绿以与背景区分）
      edge_thickness: 2
      road_overlay_bgr: [0, 180, 0]          # 绿色道路叠加
      road_overlay_alpha: 0.0
      floor_overlay_bgr: [0, 165, 255]
      floor_overlay_alpha: 0.0
      show_hud: true

  test:                      # 测试模式：路径=灰，谷地=白
    label: "测试模式"
    colors:
      road:                  # 灰色（低饱和度、中等亮度）—— 模拟物理拼图垫边框
        hsv_lower: [0, 0, 40]
        hsv_upper: [179, 80, 180]
      floor:                 # 白色（低饱和度、高亮度）—— 模拟拼图垫内部
        hsv_lower: [0, 0, 200]
        hsv_upper: [179, 60, 255]
    visualization:
      path_color_bgr: [128, 128, 128]        # 灰色（BGR）
      path_thickness: 4
      edge_color_bgr: [80, 80, 80]           # 深灰外轮廓
      edge_thickness: 2
      road_overlay_bgr: [128, 128, 128]      # 灰色道路叠加
      road_overlay_alpha: 0.0
      floor_overlay_bgr: [255, 255, 255]     # 白色地面叠加
      floor_overlay_alpha: 0.0
      show_hud: true

# 默认参数（在 modes 之外；UI 切换模式时只覆盖 colors/visualization 段）
roi:
  top_ratio: 0.40
  bottom_ratio: 0.95
  left_ratio: 0.0
  right_ratio: 1.0

morphology:
  kernel_size: 5
  opening_iter: 1
  closing_iter: 2

filter:
  min_road_area_px: 500

path:
  num_samples: 20
  smooth_window: 7
  poly_degree: 2

controller:
  lookahead_row_from_bottom: 8
  max_steer_deg: 30.0
  base_speed: 0.30
  min_speed: 0.10
  curvature_k: 0.6

temporal:
  enabled: true
  alpha: 0.40
  reset_on_no_road: true

runtime:
  print_to_stdout: true
  window_name: "Leading Line"
  exit_key: 27
